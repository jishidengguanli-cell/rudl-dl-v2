name = "rudl-api"
main = "src/index.ts"
compatibility_date = "2025-09-18"
workers_dev = false

routes = [
  { pattern = "api.dataruapp.com", custom_domain = true }
]

[[d1_databases]]
binding = "APP_DB"
database_name = "rudl_app"
database_id = "6971cadc-b4f7-4642-bc78-f1e5e1bee999"

[vars]
# 前端 App 的正式網域（你要用哪個就填哪個）
APP_ORIGIN = "https://app.dataruapp.com"
R2_BUCKET_NAME = "dataruapp-files"
R2_ACCOUNT_ID = "34a5e9d04deb1de3cbf7e71c75297db0"


# 開發時允許本機
DEV_ORIGIN = "http://localhost:3000"

# 以逗點分隔的允許來源清單（程式會讀這個）
CORS_ORIGINS = "https://app.dataruapp.com,http://localhost:3000"

# Cookie 作用域，未來登入時發 HttpOnly Cookie 要用
COOKIE_DOMAIN = ".dataruapp.com"
COOKIE_SECURE = "true"
COOKIE_SAME_SITE = "Lax"

[[kv_namespaces]]
binding = "APP_KV"
id = "f9bbc6fb03f9415d9e77fc3c7a6d50e1"
preview_id = "f9bbc6fb03f9415d9e77fc3c7a6d50e1"

# ---- bindings ----
r2_buckets = [
  { binding = "R2_BUCKET", bucket_name = "dataruapp-files" }
]