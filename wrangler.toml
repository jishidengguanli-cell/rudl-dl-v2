name = "rudl-dl"
main = "src/index.ts"
compatibility_date = "2025-09-18"
workers_dev = false

# 把 dl 子網域直接綁到這個 Worker
routes = [
  { pattern = "dl.dataruapp.com/*", custom_domain = true }
]

# D1（先建立再把 id 貼回來）
[[d1_databases]]
binding = "APP_DB"
database_name = "rudl_app"
database_id = ""  # ← 第 E 步建立後回填

# （佔位；本版沒用）
[[kv_namespaces]]
binding = "APP_KV"
id = ""

# R2 綁定（你的新名稱）
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "dataruapp-files"

# Durable Object
[[durable_objects.bindings]]
name = "PointAccountDO"
class_name = "PointAccountDO"

[[migrations]]
tag = "v1"
new_classes = ["PointAccountDO"]

[vars]
# 302 會導向這個 R2 自訂網域（你已綁好）
R2_PUBLIC_HOST = "cdn.dataruapp.com"
